<!-- UMAP Floating Window -->
<!-- This is referred to as the "semantic map" in the UI -->

<div id="umapFloatingWindow">
  <!-- Titlebar -->
  <div id="umapTitlebar">
    <span id="semanticMapTitle">Semantic Map</span>
    <div style="display: flex; align-items: center; gap: 8px">
      <!-- Resizing icons -->
      <button id="umapResizeFullscreen" title="Fullscreen" class="icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <!-- Central point -->
          <circle cx="12" cy="12" r="1.5" fill="#FFD600" />
          <!-- Bright square outline -->
          <rect
            x="4"
            y="4"
            width="16"
            height="16"
            rx="4"
            fill="none"
            stroke="#D0D0D0"
            stroke-width="1"
          />
          <!-- Arrows to corners -->
          <g stroke="#FFD600" stroke-width="2.5" fill="#FFD600">
            <!-- Top-left arrow -->
            <line x1="12" y1="12" x2="4" y2="4" />
            <polygon points="4,4 7,4 4,7" />
            <!-- Top-right arrow -->
            <line x1="12" y1="12" x2="20" y2="4" />
            <polygon points="20,4 17,4 20,7" />
            <!-- Bottom-left arrow -->
            <line x1="12" y1="12" x2="4" y2="20" />
            <polygon points="4,20 7,20 4,17" />
            <!-- Bottom-right arrow -->
            <line x1="12" y1="12" x2="20" y2="20" />
            <polygon points="20,20 17,20 20,17" />
          </g>
        </svg>
      </button>

      <button id="umapResizeBig" title="Large" class="icon-btn">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <rect
            x="4"
            y="4"
            width="20"
            height="20"
            rx="4"
            fill="#fff"
            opacity="0.8"
          />
        </svg>
      </button>
      <button id="umapResizeMedium" title="Medium" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <rect
            x="3"
            y="3"
            width="14"
            height="14"
            rx="3"
            fill="#fff"
            opacity="0.8"
          />
        </svg>
      </button>
      <button id="umapResizeSmall" title="Small" class="icon-btn">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <rect
            x="2"
            y="2"
            width="10"
            height="10"
            rx="2"
            fill="#fff"
            opacity="0.8"
          />
        </svg>
      </button>
      <button id="umapResizeShaded" title="Shaded" class="icon-btn">
        <svg width="18" height="10" viewBox="0 0 18 10">
          <rect
            x="2"
            y="2"
            width="14"
            height="6"
            rx="2"
            fill="#fff"
            opacity="0.8"
          />
        </svg>
      </button>
      <button id="umapToggleControlsBtn" title="Show controls" class="icon-btn">
        <svg width="16" height="14" viewBox="0 0 16 14">
          <rect x="2" y="1.5" width="12" height="2" rx="1" fill="#fff" opacity="0.8"/>
          <rect x="2" y="6"   width="12" height="2" rx="1" fill="#fff" opacity="0.8"/>
          <rect x="2" y="10.5" width="12" height="2" rx="1" fill="#fff" opacity="0.8"/>
        </svg>
      </button>
      <button
        id="umapCloseBtn"
        style="
          background: none;
          border: none;
          color: #fff;
          font-size: 1.5em;
          cursor: pointer;
          margin-left: 8px;
        "
        title="Close"
      >
        &times;
      </button>
    </div>
  </div>

  <!-- All other content hidden until plot is ready -->
  <div id="umapContent" style="display: none">
    <!-- Spinner (always visible during loading) -->
    <div
      id="umapSpinner"
      style="
        display: none;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 10000;
        pointer-events: none;
      "
    >
      <div class="umap-spinner"></div>
    </div>

    <!-- Plotly Plot -->
    <div id="umapPlot"></div>

    <div id="umapControls">
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 4px;
          align-items: center;
          margin-top: 4px;
        "
      >
        <!-- Row 1: Cluster Strength + Click behavior (inline) -->
        <div style="display: flex; flex-direction: row; gap: 12px; align-items: center;">
          <div id="umapEpsContainer" style="display: none; padding: 0px">
            <button id="umapClusterInfoBtn" type="button" class="umap-info-btn" title="Cluster information">i</button>
            <label for="umapEpsSpinner">Cluster Strength</label>
            <input
              type="number"
              id="umapEpsSpinner"
              min="0.01"
              max="1.0"
              step="0.01"
              value="0.1"
              style="width: 60px"
            />
          </div>
          <div id="umapClickBehaviorContainer" style="display: flex; flex-direction: row; gap: 12px;">
            <label style="display: flex; align-items: center; gap: 6px;">
              <input
                type="radio"
                name="umapClickBehavior"
                id="umapClickSelectsClusterRadio"
                value="cluster"
                checked
              />
              Click selects cluster
            </label>
            <label style="display: flex; align-items: center; gap: 6px;">
              <input
                type="radio"
                name="umapClickBehavior"
                id="umapClickSelectsImageRadio"
                value="image"
              />
              Click selects image
            </label>
          </div>
        </div>

        <!-- Rows 2-3: Checkboxes in 2 aligned columns -->
        <div
          id="umapColorModeContainer"
          style="display: grid; grid-template-columns: auto auto; gap: 2px 16px;"
        >
          <label style="display: flex; align-items: center; gap: 6px">
            <input
              type="checkbox"
              id="umapShowLandmarks"
            />
            Show landmarks
          </label>
          <label id="umapExitFullscreenLabel" style="display: flex; align-items: center; gap: 6px">
            <input
              type="checkbox"
              id="umapExitFullscreenOnSelection"
              checked
            />
            Exit fullscreen on selection
          </label>
          <label style="display: flex; align-items: center; gap: 6px">
            <input
              type="checkbox"
              id="umapShowHoverThumbnails"
              checked
            />
            Show hover thumbnails
          </label>
          <label style="display: flex; align-items: center; gap: 6px">
            <input
              type="checkbox"
              id="umapHighlightSelection"
            />
            <span>Highlight selection (<a id="umapClearSelectionLink" href="#" style="color:#4a9eff;text-decoration:none;">clear</a>)</span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Cluster Info Modal -->
<div id="umapClusterInfoModal" class="modal-overlay">
  <div class="modal-content" style="max-width: 400px; position: relative;">
    <button id="umapClusterInfoClose" class="modal-close" title="Close">✖</button>
    <p style="margin: 0 0 14px 0; color: #ccc; line-height: 1.5; font-size: 0.9em;">
      Higher cluster strength values increase the size and reduce the number of clusters.
    </p>
    <table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">
      <tr>
        <td style="color: #888; padding: 4px 0;">Current cluster strength</td>
        <td id="umapInfoEps" style="text-align: right; color: #faea0e; font-weight: bold;"></td>
      </tr>
      <tr>
        <td style="color: #888; padding: 4px 0;">Cluster count</td>
        <td id="umapInfoClusterCount" style="text-align: right; color: #fff;"></td>
      </tr>
      <tr>
        <td style="color: #888; padding: 4px 0;">Largest cluster</td>
        <td id="umapInfoLargest" style="text-align: right; color: #fff;"></td>
      </tr>
      <tr>
        <td style="color: #888; padding: 4px 0;">Smallest cluster</td>
        <td id="umapInfoSmallest" style="text-align: right; color: #fff;"></td>
      </tr>
      <tr>
        <td style="color: #888; padding: 4px 0;">Unclustered images</td>
        <td id="umapInfoUnclustered" style="text-align: right; color: #fff;"></td>
      </tr>
      <tr>
        <td style="color: #888; padding: 4px 0; border-top: 1px solid #444;">Total images</td>
        <td id="umapInfoTotal" style="text-align: right; color: #fff; border-top: 1px solid #444;"></td>
      </tr>
    </table>
  </div>
</div>
